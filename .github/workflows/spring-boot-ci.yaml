name: Spring Boot CI (Tests + Security)

on:
  push:
    branches: [ "main", "develop", "bug/**", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Java version
        run: java -version

      - name: Build and run tests
        run: mvn clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  security-dependencies:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run OWASP scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "intern-connect"
          path: "."
          format: "HTML"
          failOnCVSS: 7

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  static-analysis:
    name: SpotBugs Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run SpotBugs
        run: mvn spotbugs:check

  security-tests:
    name: Run Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run security-related tests
        run: mvn test -Dtest=*Security*

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build project
        run: mvn clean compile

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: [build-test, security-dependencies, static-analysis]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar