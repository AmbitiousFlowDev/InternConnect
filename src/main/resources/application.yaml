spring:
  application:
    name: intern-connect
  datasource:
    url: jdbc:mysql://localhost:3306/intern_connect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: app_user
    password: app_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  security:
    user:
      name: admin
      password: adminpassword