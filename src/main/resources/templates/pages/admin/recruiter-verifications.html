<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérifications recruteurs</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: main('recruiter-verifications')}"></div>

<main class="container-xl py-5">
    <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}" class="alert alert-danger"><span th:text="${errorMessage}"></span></div>

    <section class="mb-4">
        <h1 class="display-6 fw-bold">Vérifications recruteurs</h1>
        <p class="text-muted">Approuvez ou refusez les demandes de publication d'offres.</p>
    </section>

    <div th:if="${verifications == null or verifications.isEmpty()}" class="text-center text-muted py-5">
        Aucune demande de vérification pour le moment.
    </div>

    <div class="card border-0 shadow-sm" th:unless="${verifications == null or verifications.isEmpty()}">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Recruteur</th>
                    <th>Entreprise</th>
                    <th>Justificatif</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="verification : ${verifications}">
                    <td>
                        <div class="fw-semibold" th:text="${verification.recruiter.firstName + ' ' + verification.recruiter.lastName}">Nom</div>
                        <small class="text-muted" th:text="${verification.recruiter.email}">email@example.com</small>
                    </td>
                    <td th:text="${verification.companyName}">Entreprise</td>
                    <td class="small" th:text="${verification.proofDescription}">Justificatif</td>
                    <td><span class="badge text-bg-secondary" th:text="${statusLabels.verification(verification.status)}">En attente</span></td>
                    <td>
                        <form th:action="@{/admin/recruiter-verifications/{id}/review(id=${verification.id})}" method="post" class="d-flex flex-column gap-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <textarea name="adminComment" class="form-control form-control-sm" rows="2" placeholder="Commentaire administrateur"></textarea>
                            <div class="d-flex gap-2">
                                <button type="submit" name="status" value="APPROVED" class="btn btn-success btn-sm">Approuver</button>
                                <button type="submit" name="status" value="REJECTED" class="btn btn-outline-danger btn-sm">Refuser</button>
                            </div>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
