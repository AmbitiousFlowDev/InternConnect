<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification recruteur</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: main('recruiter-verification')}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}" class="alert alert-danger"><span th:text="${errorMessage}"></span></div>

    <section class="mb-4">
        <h1 class="fw-bold">Vérification recruteur</h1>
        <p class="text-muted">Votre compte recruteur doit être vérifié avant de publier une offre. Veuillez soumettre un justificatif.</p>
    </section>

    <div th:if="${verification != null}" class="alert"
         th:classappend="${verification.status.name() == 'APPROVED'} ? ' alert-success' : (${verification.status.name() == 'REJECTED'} ? ' alert-danger' : ' alert-info')">
        Statut actuel :
        <strong th:text="${statusLabels.verification(verification.status)}">En attente</strong>
        <div th:if="${verification.adminComment != null && !verification.adminComment.isBlank()}" class="small mt-2">
            Commentaire administrateur : <span th:text="${verification.adminComment}"></span>
        </div>
    </div>

    <form th:action="@{/recruiter-verification}" method="post" class="card border-0 shadow-sm">
        <div class="card-body">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label for="companyName" class="form-label">Nom de l'entreprise</label>
                <input id="companyName" name="companyName" class="form-control" required
                       placeholder="Exemple : OCP, Maroc Telecom, Capgemini...">
            </div>
            <div class="mb-3">
                <label for="proofDescription" class="form-label">Justificatif</label>
                <textarea id="proofDescription" name="proofDescription" class="form-control" rows="5" required
                          placeholder="Décrivez votre fonction, votre entreprise et les éléments qui permettent de vérifier votre identité professionnelle."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Envoyer la demande de vérification</button>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
