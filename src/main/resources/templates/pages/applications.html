<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternConnect - Mes candidatures</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light" th:attr="data-notifications-realtime=${notificationRealtimeEnabled}">
<div th:replace="~{fragments/navbar :: main('applications')}"></div>

<main class="container-xl py-5">
    <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}" class="alert alert-danger"><span th:text="${errorMessage}"></span></div>

    <section class="mb-4">
        <h1 class="display-6 fw-bold mb-1">Mes candidatures</h1>
        <p class="text-secondary mb-0">Suivez l'état de toutes vos candidatures en temps réel.</p>
    </section>

    <div class="d-flex flex-wrap gap-2 mb-4">
        <a th:href="@{/applications(status='ALL')}"
           th:classappend="${selectedStatus == null} ? ' active' : ''"
           class="btn btn-sm btn-outline-secondary">Toutes</a>
        <a th:each="s : ${statuses}"
           th:href="@{/applications(status=${s.name()})}"
           th:classappend="${selectedStatus == s} ? ' active' : ''"
           class="btn btn-sm btn-outline-secondary">
            <span th:text="${statusLabels.applicationFilter(s.name())}">Soumises</span>
            <span class="badge bg-secondary ms-1" th:text="${statusSummary[s]}">0</span>
        </a>
    </div>

    <div th:if="${applications == null or applications.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
        <p>Aucune candidature trouvée.</p>
        <a th:href="@{/internships}" class="btn btn-primary btn-sm px-4">Explorer les stages</a>
    </div>

    <div class="card overflow-hidden border-0 shadow-sm" th:unless="${applications == null or applications.isEmpty()}">
        <div class="list-group list-group-flush">
            <div th:each="app : ${applications}" class="list-group-item p-4">
                <div class="d-flex gap-3">
                    <div class="avatar-box avatar-square"
                         th:text="${app.internship != null && app.internship.company != null && #strings.length(app.internship.company) >= 2}
                         ? ${#strings.substring(app.internship.company, 0, 2).toUpperCase()} : 'IC'">IC</div>
                    <div class="flex-grow-1">
                        <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-2">
                            <div>
                                <h2 class="h6 fw-bold mb-1" th:text="${app.internship != null ? app.internship.title : 'Stage'}">Stage</h2>
                                <div class="d-flex flex-wrap gap-3 text-muted small">
                                    <span><i class="bi bi-building me-1"></i><span th:text="${app.internship != null ? app.internship.company : 'Entreprise'}">Entreprise</span></span>
                                    <span><i class="bi bi-geo-alt me-1"></i><span th:text="${app.internship != null ? app.internship.location : 'Non spécifié'}">Localisation</span></span>
                                </div>
                            </div>
                            <span class="badge align-self-start px-3 py-2"
                                  th:text="${statusLabels.application(app.status)}"
                                  th:classappend="${app.status.name() == 'ACCEPTED'} ? ' bg-success'
                                  : (${app.status.name() == 'REJECTED'} ? ' bg-danger'
                                  : (${app.status.name() == 'UNDER_REVIEW'} ? ' bg-info'
                                  : ' bg-warning text-dark'))">Soumise</span>
                        </div>
                        <div class="text-muted small d-flex flex-wrap gap-3">
                            <span><i class="bi bi-clock me-1"></i>Soumise le
                                <span th:text="${app.submittedAt != null ? #temporals.format(app.submittedAt, 'dd MMM yyyy') : 'Date inconnue'}">01 Jan 2026</span>
                            </span>
                            <span th:if="${app.updatedAt != null and app.updatedAt != app.submittedAt}">
                                <i class="bi bi-arrow-repeat me-1"></i>Mise à jour le
                                <span th:text="${#temporals.format(app.updatedAt, 'dd MMM yyyy')}">02 Jan 2026</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
