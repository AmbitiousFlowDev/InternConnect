<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidats de l'offre</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js" defer></script>
    <script th:src="@{/assets/js/notifications.js}" defer></script>
</head>

<body class="bg-light"  th:attr="data-notifications-realtime=${notificationRealtimeEnabled}">
<div th:replace="~{fragments/navbar :: main('my-offers')}"></div>

<main class="container-xl py-5">
    <section class="mb-4">
        <h1 class="display-6 fw-bold mb-1">Candidats de l'offre</h1>
        <p class="text-secondary mb-0">Consultez et filtrez les etudiants qui ont postule a cette offre.</p>
    </section>

    <form th:action="@{/applications/offers/{id}(id=${offerId})}" method="get" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label for="applicantName" class="form-label">Nom du candidat</label>
                    <input id="applicantName"
                           name="applicantName"
                           type="search"
                           class="form-control"
                           th:value="${applicantName}"
                           placeholder="Rechercher par prenom ou nom">
                </div>

                <div class="col-md-4">
                    <label for="submittedDate" class="form-label">Date de candidature</label>
                    <input id="submittedDate"
                           name="submittedDate"
                           type="date"
                           class="form-control"
                           th:value="${submittedDate}">
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-funnel me-1"></i>
                        Filtrer
                    </button>
                </div>
            </div>
        </div>
    </form>

    <div th:if="${applications == null or applications.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
        <p>Aucune candidature trouvee pour cette offre.</p>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" th:unless="${applications == null or applications.isEmpty()}">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Etudiant</th>
                    <th>Email</th>
                    <th>Statut</th>
                    <th>Date de candidature</th>
                    <th>CV</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="candidateApplication : ${applications}">
                    <td>
                        <div class="fw-semibold"
                             th:text="${candidateApplication.applicant != null
                             ? candidateApplication.applicant.firstName + ' ' + candidateApplication.applicant.lastName
                             : 'Candidat'}">
                            Candidat
                        </div>
                    </td>
                    <td th:text="${candidateApplication.applicant != null ? candidateApplication.applicant.email : 'Non renseigne'}">
                        email@example.com
                    </td>
                    <td>
                        <span class="badge px-3 py-2"
                              th:text="${candidateApplication.status}"
                              th:classappend="${candidateApplication.status.name() == 'ACCEPTED'} ? ' bg-success'
                              : (${candidateApplication.status.name() == 'REJECTED'} ? ' bg-danger'
                              : (${candidateApplication.status.name() == 'UNDER_REVIEW'} ? ' bg-info'
                              : ' bg-warning text-dark'))">
                            SUBMITTED
                        </span>
                    </td>
                    <td th:text="${candidateApplication.submittedAt != null ? #temporals.format(candidateApplication.submittedAt, 'dd MMM yyyy HH:mm') : 'Date inconnue'}">
                        01 Jan 2026
                    </td>
                    <td th:text="${candidateApplication.resumeFile != null && !candidateApplication.resumeFile.isBlank() ? candidateApplication.resumeFile : 'Non fourni'}">
                        cv.pdf
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
