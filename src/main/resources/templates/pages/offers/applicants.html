<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidats pour cette offre</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light" th:attr="data-notifications-realtime=${notificationRealtimeEnabled}">
<div th:replace="~{fragments/navbar :: main('my-offers')}"></div>

<main class="container-xl py-5">
    <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}" class="alert alert-danger"><span th:text="${errorMessage}"></span></div>

    <section class="mb-4">
        <h1 class="display-6 fw-bold mb-1">Candidats pour cette offre</h1>
        <p class="text-secondary mb-0">Consultez les étudiants qui ont postulé et mettez leur statut à jour.</p>
    </section>

    <form th:action="@{/poster/offers/{id}/applications(id=${offerId})}" method="get" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label for="applicantName" class="form-label">Nom du candidat</label>
                    <input id="applicantName" name="applicantName" type="search" class="form-control"
                           th:value="${applicantName}" placeholder="Rechercher par prénom ou nom">
                </div>
                <div class="col-md-4">
                    <label for="submittedDate" class="form-label">Date de candidature</label>
                    <input id="submittedDate" name="submittedDate" type="date" class="form-control" th:value="${submittedDate}">
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-funnel me-1"></i>Filtrer</button>
                </div>
            </div>
        </div>
    </form>

    <div th:if="${applications == null or applications.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
        <p>Aucun candidat n'a encore postulé à cette offre.</p>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" th:unless="${applications == null or applications.isEmpty()}">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Candidat</th>
                    <th>Email</th>
                    <th>Offre</th>
                    <th>Date de candidature</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="candidateApplication : ${applications}">
                    <td class="fw-semibold" th:text="${candidateApplication.applicant != null ? candidateApplication.applicant.firstName + ' ' + candidateApplication.applicant.lastName : 'Candidat'}">Candidat</td>
                    <td th:text="${candidateApplication.applicant != null ? candidateApplication.applicant.email : 'Non renseigné'}">email@example.com</td>
                    <td th:text="${candidateApplication.internship != null ? candidateApplication.internship.title : 'Stage'}">Stage</td>
                    <td th:text="${candidateApplication.submittedAt != null ? #temporals.format(candidateApplication.submittedAt, 'dd MMM yyyy HH:mm') : 'Date inconnue'}">01 Jan 2026</td>
                    <td>
                        <span class="badge px-3 py-2"
                              th:text="${statusLabels.application(candidateApplication.status)}"
                              th:classappend="${candidateApplication.status.name() == 'ACCEPTED'} ? ' bg-success'
                              : (${candidateApplication.status.name() == 'REJECTED'} ? ' bg-danger'
                              : (${candidateApplication.status.name() == 'UNDER_REVIEW'} ? ' bg-info'
                              : ' bg-warning text-dark'))">Soumise</span>
                    </td>
                    <td>
                        <div class="d-flex flex-wrap gap-2">
                            <form th:action="@{/poster/applications/{id}/status(id=${candidateApplication.id})}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="offerId" th:value="${offerId}">
                                <input type="hidden" name="status" value="UNDER_REVIEW">
                                <button type="submit" class="btn btn-outline-info btn-sm">Marquer comme en cours d'examen</button>
                            </form>
                            <form th:action="@{/poster/applications/{id}/status(id=${candidateApplication.id})}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="offerId" th:value="${offerId}">
                                <input type="hidden" name="status" value="ACCEPTED">
                                <button type="submit" class="btn btn-outline-success btn-sm">Accepter</button>
                            </form>
                            <form th:action="@{/poster/applications/{id}/status(id=${candidateApplication.id})}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="offerId" th:value="${offerId}">
                                <input type="hidden" name="status" value="REJECTED">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Refuser</button>
                            </form>
                            <form th:action="@{/conversations/start}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="applicationId" th:value="${candidateApplication.id}">
                                <button type="submit" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-chat-dots me-1"></i>Contacter
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
