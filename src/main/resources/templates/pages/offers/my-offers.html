<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes offres</title>

    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js" defer></script>
    <script th:src="@{/assets/js/notifications.js}" defer></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light"  th:attr="data-notifications-realtime=${notificationRealtimeEnabled}">

<div th:replace="~{fragments/navbar :: main('my-offers')}"></div>

<main class="container py-5">

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Mes offres</h1>
            <p class="text-muted">
                GÃ©rez les offres de stage que vous avez publiÃ©es.
            </p>
        </div>

        <a th:href="@{/offers/publish}" class="btn btn-primary">
            Publier une nouvelle offre
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <div th:if="${#lists.isEmpty(offers)}"
                 class="text-center text-muted py-5">
                Aucune offre publiÃ©e pour le moment.
            </div>

            <div class="list-group" th:if="${!#lists.isEmpty(offers)}">

                <div class="list-group-item" th:each="offer : ${offers}">

                    <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">

                        <div>
                            <h5 class="fw-bold mb-1" th:text="${offer.title}">
                                Titre offre
                            </h5>

                            <p class="text-muted mb-1">
                                <span th:text="${offer.company}">Entreprise</span>
                                <span th:if="${offer.company != null && offer.location != null}"> Â· </span>
                                <span th:text="${offer.location}">Localisation</span>
                            </p>

                            <small class="text-muted">
                                Statut :
                                <span th:text="${offer.status}">ACTIVE</span>
                            </small>
                        </div>

                        <div class="d-flex gap-2 align-items-center flex-wrap justify-content-end">

                            <a th:href="@{/applications/offers/{id}(id=${offer.id})}"
                               class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-people me-1"></i>
                                Candidats
                            </a>

                            <a th:href="@{/offers/edit/{id}(id=${offer.id})}"
                               class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-pencil-square me-1"></i>
                                Modifier
                            </a>

                            <button type="button"
                                    class="btn btn-outline-danger btn-sm"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="${'#deleteOfferModal-' + offer.id}">
                                <i class="bi bi-trash me-1"></i>
                                Supprimer
                            </button>

                        </div>

                    </div>

                    <div class="modal fade"
                         th:id="${'deleteOfferModal-' + offer.id}"
                         tabindex="-1"
                         aria-hidden="true">

                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content">

                                <div class="modal-header">
                                    <h5 class="modal-title">
                                        Confirmer la suppression
                                    </h5>

                                    <button type="button"
                                            class="btn-close"
                                            data-bs-dismiss="modal"
                                            aria-label="Fermer">
                                    </button>
                                </div>

                                <div class="modal-body">
                                    Voulez-vous vraiment supprimer cette offre ?
                                    <strong th:text="${offer.title}">
                                        Titre offre
                                    </strong>
                                </div>

                                <div class="modal-footer">
                                    <button type="button"
                                            class="btn btn-outline-secondary"
                                            data-bs-dismiss="modal">
                                        Annuler
                                    </button>

                                    <form th:action="@{/offers/delete}"
                                          method="post"
                                          class="m-0">

                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">

                                        <input type="hidden"
                                               name="id"
                                               th:value="${offer.id}">

                                        <button type="submit"
                                                class="btn btn-danger">
                                            Supprimer
                                        </button>

                                    </form>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
