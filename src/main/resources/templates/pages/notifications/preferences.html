<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternConnect - Preferences de notifications</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js" defer></script>
    <script th:src="@{/assets/js/notifications.js}" defer></script>
</head>
<body class="bg-light" th:attr="data-notifications-realtime=${notificationRealtimeEnabled}">

<div th:replace="~{fragments/navbar :: main('notifications')}"></div>

<main class="container-xl py-5">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="fw-bold">Preferences de notifications</h1>
            <p class="text-muted mb-0">Choisissez les types de notifications que vous souhaitez recevoir.</p>
        </div>
        <a class="btn btn-outline-primary align-self-start align-self-lg-center" th:href="@{/notifications}">
            <i class="bi bi-bell me-1"></i>
            Notifications
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div class="card card-soft">
        <div class="card-body p-4">
            <form th:action="@{/notifications/preferences}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="applicationNotifications"
                           name="applicationNotifications" th:checked="${preferences.applicationNotifications}">
                    <label class="form-check-label" for="applicationNotifications">
                        Candidatures recues
                    </label>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="messageNotifications"
                           name="messageNotifications" th:checked="${preferences.messageNotifications}">
                    <label class="form-check-label" for="messageNotifications">
                        Nouveaux messages
                    </label>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="statusUpdateNotifications"
                           name="statusUpdateNotifications" th:checked="${preferences.statusUpdateNotifications}">
                    <label class="form-check-label" for="statusUpdateNotifications">
                        Changements de statut de candidature
                    </label>
                </div>

                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" id="realtimeEnabled"
                           name="realtimeEnabled" th:checked="${preferences.realtimeEnabled}">
                    <label class="form-check-label" for="realtimeEnabled">
                        Notifications en temps reel
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">
                    Enregistrer
                </button>
            </form>
        </div>
    </div>
</main>

<div class="toast-container position-fixed bottom-0 end-0 p-3" data-notification-toasts></div>

</body>
</html>
