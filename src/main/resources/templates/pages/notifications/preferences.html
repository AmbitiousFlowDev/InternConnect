<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Préférences de notifications</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top py-2">
    <div class="container-xl">
        <a class="navbar-brand fw-bold fs-3" th:href="@{/home}">InternConnect</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light btn-sm rounded-pill" th:href="@{/notifications}">
                <i class="bi bi-bell me-1"></i> Notifications
            </a>
            <a class="btn btn-light btn-sm rounded-pill" th:href="@{/dashboard}">
                Tableau de bord
            </a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="mb-4">
        <h1 class="fw-bold">Préférences de notifications</h1>
        <p class="text-muted">Choisissez les types de notifications que vous souhaitez recevoir.</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/notifications/preferences}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="applicationNotifications"
                           name="applicationNotifications" th:checked="${preferences.applicationNotifications}">
                    <label class="form-check-label" for="applicationNotifications">
                        Candidatures reçues
                    </label>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="messageNotifications"
                           name="messageNotifications" th:checked="${preferences.messageNotifications}">
                    <label class="form-check-label" for="messageNotifications">
                        Nouveaux messages
                    </label>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="statusUpdateNotifications"
                           name="statusUpdateNotifications" th:checked="${preferences.statusUpdateNotifications}">
                    <label class="form-check-label" for="statusUpdateNotifications">
                        Changements de statut de candidature
                    </label>
                </div>

                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" id="realtimeEnabled"
                           name="realtimeEnabled" th:checked="${preferences.realtimeEnabled}">
                    <label class="form-check-label" for="realtimeEnabled">
                        Notifications en temps réel
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">
                    Enregistrer
                </button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
