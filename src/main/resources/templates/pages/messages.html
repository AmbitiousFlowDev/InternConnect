<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternConnect - Messages</title>
  <link rel="stylesheet" th:href="@{/assets/css/main.css}">
  <script th:src="@{/assets/js/main.js}" defer></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js" defer></script>
  <script th:src="@{/assets/js/notifications.js}" defer></script>
</head>
<body class="bg-light" th:attr="data-notifications-realtime=${notificationRealtimeEnabled}">

<div th:replace="~{fragments/navbar :: main('messages')}"></div>

<main class="container-xl py-4 py-lg-5">
  <div th:if="${successMessage}" class="alert alert-success">
    <span th:text="${successMessage}"></span>
  </div>

  <div th:if="${errorMessage}" class="alert alert-danger">
    <span th:text="${errorMessage}"></span>
  </div>

  <section class="row g-4 app-messages-shell">
    <aside class="col-lg-4 col-xl-3">
      <div class="card card-soft h-100 app-messages-panel">
        <div class="card-body border-bottom">
          <div class="d-flex align-items-center justify-content-between gap-3">
            <div>
              <h1 class="h4 fw-bold mb-1">Messages</h1>
              <p class="text-muted small mb-0">Conversations récentes</p>
            </div>
            <span class="badge text-bg-primary rounded-pill"
                  th:text="${partners != null ? #lists.size(partners) : 0}">0</span>
          </div>
        </div>

        <div class="list-group list-group-flush app-conversation-list">
          <div th:if="${partners == null or partners.isEmpty()}"
               class="text-center text-muted p-5">
            <i class="bi bi-chat-dots fs-1 d-block mb-3 opacity-25"></i>
            <p class="mb-0">Aucune conversation pour le moment.</p>
          </div>

          <a th:each="partner : ${partners}"
             th:href="@{/messages/{id}(id=${partner.id})}"
             class="list-group-item list-group-item-action d-flex align-items-center gap-3 p-3"
             th:classappend="${partnerId != null and partner.id == partnerId} ? ' active' : ''">
            <span class="avatar-box"
                  th:classappend="${partnerId != null and partner.id == partnerId} ? ' border-light text-primary bg-white' : ''"
                  th:text="${@userDisplayService.getInitials(partner)}">AB</span>
            <span class="min-w-0">
              <span class="d-block fw-semibold text-truncate"
                    th:text="${partner.firstName + ' ' + partner.lastName}">Nom Prenom</span>
              <span class="d-block small text-truncate"
                    th:classappend="${partnerId != null and partner.id == partnerId} ? ' text-white-50' : ' text-muted'"
                    th:text="${partner.role}">Role</span>
            </span>
          </a>
        </div>
      </div>
    </aside>

    <section class="col-lg-8 col-xl-9">
      <div class="card card-soft h-100 app-chat-panel">
        <div th:if="${partnerId == null}" class="card-body d-flex align-items-center justify-content-center text-center text-muted">
          <div>
            <i class="bi bi-chat-square-text fs-1 d-block mb-3 opacity-25"></i>
            <h2 class="h5 fw-bold text-dark">Sélectionnez une conversation</h2>
            <p class="mb-0">Choisissez un contact pour lire et envoyer des messages.</p>
          </div>
        </div>

        <div th:if="${partnerId != null}" class="d-flex flex-column h-100">
          <div class="card-body border-bottom py-3 app-chat-header">
            <div class="d-flex align-items-center gap-3">
              <span class="avatar-box avatar-box-lg">
                <span th:each="partner : ${partners}"
                      th:if="${partner.id == partnerId}"
                      th:text="${@userDisplayService.getInitials(partner)}">AB</span>
              </span>
              <div>
                <h2 class="h5 fw-bold mb-0">
                  <span th:each="partner : ${partners}"
                        th:if="${partner.id == partnerId}"
                        th:text="${partner.firstName + ' ' + partner.lastName}">Nom</span>
                </h2>
                <p class="text-muted small mb-0">Conversation active</p>
              </div>
            </div>
          </div>

          <div class="card-body app-message-thread" id="messagesArea">
            <div th:if="${messages == null or messages.isEmpty()}"
                 class="text-center text-muted py-5">
              <i class="bi bi-send fs-2 d-block mb-2 opacity-25"></i>
              <p class="mb-0">Aucun message. Commencez la conversation.</p>
            </div>

            <div th:each="msg : ${messages}" class="mb-3">
              <div th:if="${msg.sender.id != user.id}" class="d-flex align-items-start gap-2">
                <span class="avatar-box"
                      th:text="${@userDisplayService.getInitials(msg.sender)}">AB</span>
                <div class="app-message-bubble app-message-bubble-in">
                  <p class="mb-1" th:text="${msg.content}">Message</p>
                  <small class="text-muted" th:text="${#temporals.format(msg.sentAt, 'dd MMM HH:mm')}">Date</small>
                </div>
              </div>

              <div th:if="${msg.sender.id == user.id}" class="d-flex justify-content-end">
                <div class="app-message-bubble app-message-bubble-out">
                  <p class="mb-1" th:text="${msg.content}">Message</p>
                  <small class="text-white-50" th:text="${#temporals.format(msg.sentAt, 'dd MMM HH:mm')}">Date</small>
                </div>
              </div>
            </div>
          </div>

          <div class="card-body border-top app-chat-composer">
            <form th:action="@{/messages/send}" method="post" class="d-flex align-items-end gap-2">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="recipientId" th:value="${partnerId}">
              <div class="flex-grow-1">
                <label for="messageInput" class="visually-hidden">Message</label>
                <textarea id="messageInput"
                          name="content"
                          placeholder="Écrivez votre message..."
                          rows="1"
                          required
                          class="form-control app-message-input"
                          onkeydown="handleKeyDown(event)"
                          oninput="autoResize(this)"></textarea>
              </div>
              <button type="submit" class="btn btn-primary app-send-button" title="Envoyer le message">
                <i class="bi bi-send-fill"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </section>
</main>

<div class="toast-container position-fixed bottom-0 end-0 p-3" data-notification-toasts></div>

<script>
  function handleKeyDown(event) {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      event.target.closest("form").submit();
    }
  }

  function autoResize(textarea) {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 150) + "px";
  }

  const messagesArea = document.getElementById("messagesArea");
  if (messagesArea) {
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }
</script>

</body>
</html>
