<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternConnect - Profil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f7f9fc;
    }

    .header-gradient {
      background: linear-gradient(to right, #142a6e, #1a3f91);
      color: white;
    }

    .card {
      border-radius: 1rem;
      border: none;
      box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.05);
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #1f4bd8;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 1rem;
    }

    .form-control:read-only {
      background-color: #f3f4f6;
      border: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header-gradient py-3 mb-4">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">

    <div>
      <h4 class="fw-bold mb-1">Mon Profil</h4>
      <p class="mb-0 small opacity-75">
        Gérez vos informations personnelles
      </p>
    </div>

    <div class="d-flex gap-2">

      <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Retour
      </a>

      <a th:href="@{/profile/export}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-file-earmark-text"></i> Exporter CV
      </a>

      <button id="editBtn" class="btn btn-light text-primary btn-sm">
        <i class="bi bi-pencil"></i>
        <span id="btnText">Modifier</span>
      </button>

    </div>
  </div>
</div>

<div class="container pb-5">

  <!-- SUCCESS -->
  <div th:if="${saved}" class="alert alert-success d-flex align-items-center gap-2">
    <i class="bi bi-check-circle"></i>
    <span>Profil sauvegardé avec succès.</span>
  </div>

  <form id="profileForm" th:action="@{/profile}" method="post" th:object="${form}">

    <div class="row g-4 mb-4">

      <!-- LEFT -->
      <div class="col-lg-4">
        <div class="card p-4 text-center h-100">

          <div class="profile-avatar"
               th:text="${user != null && user.firstName != null && user.lastName != null}
                        ? ${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}
                        : '??'">
            AM
          </div>

          <h5 class="fw-bold"
              th:text="${user != null ? user.firstName + ' ' + user.lastName : 'Utilisateur'}">
            Alex Martin
          </h5>

          <p class="text-muted small mb-3"
             th:text="${user != null ? user.role : ''}">
            USER
          </p>

          <div class="text-start border-top pt-3 small text-muted">

            <div class="mb-2">
              <i class="bi bi-envelope me-2"></i>
              <span th:text="${user != null ? user.email : ''}">email</span>
            </div>

            <div>
              <i class="bi bi-calendar me-2"></i>
              <span th:text="${user != null && user.registrationDate != null}
                              ? 'Membre depuis ' + ${#temporals.format(user.registrationDate,'MMM yyyy')}
                              : ''">
              </span>
            </div>

          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="col-lg-8">
        <div class="card p-4 h-100">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">
              <i class="bi bi-person me-2 text-primary"></i>
              Informations personnelles
            </h5>

            <button type="submit" id="saveBtn" class="btn btn-primary btn-sm d-none">
              Enregistrer
            </button>
          </div>

          <div class="row g-3">

            <div class="col-md-6">
              <label for="firstName" class="form-label small">Prénom</label>
              <input id="firstName" th:field="*{firstName}" class="form-control view-mode" readonly>
            </div>

            <div class="col-md-6">
              <label for="lastName" class="form-label small">Nom</label>
              <input id="lastName" th:field="*{lastName}" class="form-control view-mode" readonly>
            </div>

            <div class="col-12">
              <label for="bio" class="form-label small">Bio</label>
              <textarea id="bio" th:field="*{description}" class="form-control view-mode" rows="3" readonly></textarea>
            </div>

          </div>

        </div>
      </div>

    </div>

    <!-- EXTRA -->
    <div class="card p-4 mb-4">

      <h5 class="fw-bold mb-3">
        <i class="bi bi-mortarboard me-2 text-primary"></i>
        Formation & Compétences
      </h5>

      <div class="mb-3">
        <label class="form-label small">Éducation</label>
        <textarea th:field="*{education}" class="form-control view-mode" rows="2" readonly></textarea>
      </div>

      <div>
        <label class="form-label small">Compétences</label>
        <input th:field="*{skills}" class="form-control view-mode" readonly>
      </div>

    </div>

    <div class="card p-4">

      <h5 class="fw-bold mb-3">
        <i class="bi bi-briefcase me-2 text-primary"></i>
        Expériences
      </h5>

      <div class="mb-3">
        <label class="form-label small">Expérience</label>
        <textarea th:field="*{experience}" class="form-control view-mode" rows="3" readonly></textarea>
      </div>

      <div>
        <label class="form-label small">Préférences</label>
        <textarea th:field="*{preferences}" class="form-control view-mode" rows="2" readonly></textarea>
      </div>

    </div>

  </form>
</div>

<script>
  let editing = false;

  document.getElementById("editBtn").addEventListener("click", function () {
    editing = !editing;

    const inputs = document.querySelectorAll(".view-mode");
    const saveBtn = document.getElementById("saveBtn");
    const btnText = document.getElementById("btnText");

    if (editing) {
      inputs.forEach(i => i.removeAttribute("readonly"));
      saveBtn.classList.remove("d-none");
      btnText.textContent = "Annuler";
      this.classList.replace("btn-light", "btn-danger");
      this.classList.replace("text-primary", "text-white");
    } else {
      window.location.reload();
    }
  });
</script>

</body>
</html>
