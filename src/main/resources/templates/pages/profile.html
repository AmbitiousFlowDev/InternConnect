<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternConnect - Mon Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f7f9fc; }
        .bg-header { background: linear-gradient(to right, #142a6e, #1a3f91); color: white; }
        .feature-icon { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 8px; }
        .card { border-radius: 16px; border: 1px solid #e5e7eb; }
        .form-control:read-only { background-color: #f3f4f6; border-color: transparent; }
        .btn-primary-custom { background-color: #1f4bd8; border: none; }
        .profile-avatar { width: 100px; height: 100px; background: #1f4bd8; color: white; font-size: 2rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 1rem; }
    </style>
</head>
<body>

<div class="bg-header py-5 mb-4">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div>
                <h1 class="fw-bold mb-1">Mon Profil</h1>
                <p class="opacity-75 mb-0">Gérez vos informations personnelles et professionnelles</p>
            </div>
            <div class="mt-3 mt-md-0 d-flex gap-2">
                <a th:href="@{/profile/export}" class="btn btn-outline-light d-flex align-items-center gap-2">
                    <i data-lucide="file-text" style="width: 18px;"></i> Exporter CV
                </a>
                <a th:href="@{/dashboard}" class="btn btn-outline-light d-flex align-items-center gap-2">
                    <i data-lucide="arrow-left" style="width: 18px;"></i> Retour
                </a>
                <button id="editBtn" onclick="toggleEditMode()" class="btn btn-light text-primary d-flex align-items-center gap-2">
                    <i data-lucide="edit-3" style="width: 18px;"></i> <span id="btnText">Modifier le profil</span>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5">
    <div th:if="${saved}" class="alert alert-success d-flex align-items-center gap-2 mb-4" role="alert">
        <i data-lucide="check-circle" style="width: 20px;"></i>
        <div>Profil sauvegardé avec succès.</div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-4 shadow-sm text-center mb-4">
                <div class="profile-avatar fw-bold">
                    <span th:text="${user.firstName != null && user.lastName != null} ? ${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)} : '??'">AM</span>
                </div>
                <h3 class="fw-bold mb-1" th:text="${user.firstName + ' ' + user.lastName}">Alex Martin</h3>
                <p class="text-muted small mb-4" th:text="${user.role}">USER</p>

                <div class="text-start border-top pt-3">
                    <div class="d-flex align-items-center gap-3 mb-2 text-muted small">
                        <i data-lucide="mail" style="width: 16px;"></i>
                        <span th:text="${user.email}">email@univ.fr</span>
                    </div>
                    <div class="d-flex align-items-center gap-3 text-muted small">
                        <i data-lucide="calendar" style="width: 16px;"></i>
                        <span th:text="${user.registrationDate != null} ? 'Membre depuis ' + ${#temporals.format(user.registrationDate, 'MMM yyyy')} : 'Membre'">Jan 2024</span>
                    </div>
                </div>
            </div>

            <div class="card p-4 shadow-sm">
                <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
                    <i data-lucide="bar-chart-2" class="text-primary" style="width: 20px;"></i> Statistiques
                </h5>
                <div class="mb-3">
                    <div class="d-flex justify-content-between small mb-1">
                        <span>Profil complété</span>
                        <span class="fw-bold" th:text="${profileCompleteness ?: 0} + '%'">80%</span>
                    </div>
                    <div class="progress" style="height: 8px;">
                        <div class="progress-bar bg-info" th:style="'width: ' + ${profileCompleteness ?: 0} + '%'"></div>
                    </div>
                </div>
                <div class="d-flex justify-content-between border-bottom py-2 small">
                    <span class="text-muted">Candidatures</span>
                    <span class="fw-bold" th:text="${applicationCount ?: 0}">0</span>
                </div>
                <div class="d-flex justify-content-between py-2 small">
                    <span class="text-muted">Sauvegardes</span>
                    <span class="fw-bold" th:text="${savedCount ?: 0}">0</span>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <form id="profileForm" th:action="@{/profile}" method="post" th:object="${form}">
                <div class="card p-4 shadow-sm mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0 d-flex align-items-center gap-2">
                            <i data-lucide="user" class="text-primary"></i> Infos Personnelles
                        </h4>
                        <button type="submit" id="saveBtn" class="btn btn-primary-custom text-white px-4 d-none">
                            Enregistrer
                        </button>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-medium text-muted">Prénom</label>
                            <input type="text" th:field="*{firstName}" class="form-control view-mode" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-medium text-muted">Nom</label>
                            <input type="text" th:field="*{lastName}" class="form-control view-mode" readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-medium text-muted">Bio</label>
                            <textarea th:field="*{description}" rows="3" class="form-control view-mode" readonly placeholder="Parlez-nous de vous..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="card p-4 shadow-sm mb-4">
                    <h4 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <i data-lucide="graduation-cap" class="text-primary"></i> Formation & Compétences
                    </h4>
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">Éducation</label>
                        <textarea th:field="*{education}" class="form-control view-mode" rows="2" readonly></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">Compétences (séparées par des virgules)</label>
                        <input type="text" th:field="*{skills}" class="form-control view-mode" readonly>
                    </div>
                </div>

                <div class="card p-4 shadow-sm">
                    <h4 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <i data-lucide="briefcase" class="text-primary"></i> Expériences & Préférences
                    </h4>
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">Expérience Professionnelle</label>
                        <textarea th:field="*{experience}" class="form-control view-mode" rows="4" readonly></textarea>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-medium text-muted">Préférences de stage</label>
                        <textarea th:field="*{preferences}" class="form-control view-mode" rows="2" readonly></textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    function toggleEditMode() {
        const btn = document.getElementById('editBtn');
        const btnText = document.getElementById('btnText');
        const saveBtn = document.getElementById('saveBtn');
        const inputs = document.querySelectorAll('.view-mode');

        const isEditing = btn.classList.contains('btn-danger');

        if (!isEditing) {
            btn.classList.replace('btn-light', 'btn-danger');
            btn.classList.remove('text-primary');
            btn.classList.add('text-white');
            btnText.textContent = "Annuler";
            saveBtn.classList.remove('d-none');
            inputs.forEach(input => input.removeAttribute('readonly'));
        } else {
            window.location.reload();
        }
    }
</script>
</body>
</html>
