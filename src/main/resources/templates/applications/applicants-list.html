<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Candidats</title>

    <link rel="stylesheet" th:href="@{/assets/css/main.css}">
    <script th:src="@{/assets/js/main.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/applications.css}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: main('applications')}"></div>

<main class="container py-5">

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="fw-bold mb-1">Candidats</h1>
            <p class="text-muted mb-0">
                Liste des Ã©tudiants ayant postulÃ© Ã  cette offre.
            </p>
        </div>

        <a th:href="@{/offers/my}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>
            Retour aux offres
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">

            <form th:action="@{/applications/offers/{id}(id=${offerId})}"
                  method="get"
                  class="row g-3 align-items-end">

                <div class="col-md-5">
                    <label for="applicantName" class="form-label">
                        Nom du candidat
                    </label>

                    <input type="text"
                           id="applicantName"
                           name="applicantName"
                           class="form-control"
                           placeholder="Ex: Ahmed, Sara..."
                           th:value="${applicantName}">
                </div>

                <div class="col-md-4">
                    <label for="submittedDate" class="form-label">
                        Date de candidature
                    </label>

                    <input type="date"
                           id="submittedDate"
                           name="submittedDate"
                           class="form-control"
                           th:value="${submittedDate}">
                </div>

                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i>
                        Filtrer
                    </button>

                    <a th:href="@{/applications/offers/{id}(id=${offerId})}"
                       class="btn btn-outline-secondary">
                        Reset
                    </a>
                </div>

            </form>

        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <div th:if="${#lists.isEmpty(applications)}"
                 class="text-center text-muted py-5">
                Aucune candidature trouvÃ©e.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(applications)}">

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Ã‰tudiant</th>
                        <th>Email</th>
                        <th>Date</th>
                        <th>Statut</th>
                        <th class="text-end">Action</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="app : ${applications}">

                        <td>
                            <div class="d-flex align-items-center gap-2">

                                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                                     style="width: 36px; height: 36px;"
                                     th:text="${app.applicant != null && app.applicant.firstName != null
                                     ? #strings.substring(app.applicant.firstName,0,1)
                                     : '?'}">
                                    ?
                                </div>

                                <div>
                                    <div class="fw-semibold"
                                         th:text="${app.applicant != null
                                         ? app.applicant.firstName + ' ' + app.applicant.lastName
                                         : 'Utilisateur inconnu'}">
                                        Nom Ã©tudiant
                                    </div>

                                    <small class="text-muted"
                                           th:text="${app.coverLetter != null && !#strings.isEmpty(app.coverLetter)
                                           ? 'Lettre de motivation fournie'
                                           : 'Aucune lettre de motivation'}">
                                        Lettre de motivation
                                    </small>
                                </div>

                            </div>
                        </td>

                        <td th:text="${app.applicant != null ? app.applicant.email : 'N/A'}">
                            email@example.com
                        </td>

                        <td th:text="${app.submittedAt != null ? #temporals.format(app.submittedAt, 'dd/MM/yyyy') : 'N/A'}">
                            01/01/2026
                        </td>

                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${app.status}">
                                SUBMITTED
                            </span>
                        </td>

                        <td class="text-end">

                            <form method="post"
                                  th:action="@{/applications/{id}/status(id=${app.id})}"
                                  class="d-flex justify-content-end gap-2">

                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <select name="status"
                                        class="form-select form-select-sm"
                                        style="max-width: 170px;">

                                    <option th:each="statusOption : ${T(uca.github.org.models.Application.ApplicationStatus).values()}"
                                            th:value="${statusOption}"
                                            th:text="${statusOption}"
                                            th:selected="${statusOption == app.status}">
                                        SUBMITTED
                                    </option>

                                </select>

                                <button type="submit"
                                        class="btn btn-primary btn-sm">
                                    Mettre Ã  jour
                                </button>

                            </form>

                        </td>

                    </tr>

                    </tbody>
                </table>

            </div>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
