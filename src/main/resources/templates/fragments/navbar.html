<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="main(activePage)" class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top py-2">
  <div class="container-xl">
    <a class="navbar-brand fw-bold fs-3" th:href="@{/home}">
      InternConnect
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Basculer la navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-lg-4 me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activePage == 'home'} ? ' active'" th:href="@{/home}">
            <i class="bi bi-house-door me-1"></i>
            Accueil
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active'" th:href="@{/dashboard}">
            <i class="bi bi-speedometer2 me-1"></i>
            Tableau de bord
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'internships'} ? ' active'" th:href="@{/internships}">
            <i class="bi bi-briefcase me-1"></i>
            Stages
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'applications'} ? ' active'" th:href="@{/applications/status}">
            <i class="bi bi-file-earmark-text me-1"></i>
            Candidatures
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'bookmarks'} ? ' active'" th:href="@{/bookmarks}">
            <i class="bi bi-bookmark me-1"></i>
            Sauvegardes
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'messages'} ? ' active'" th:href="@{/messages}">
            <i class="bi bi-chat-dots me-1"></i>
            Messages
          </a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:classappend="${activePage == 'roles'} ? ' active'" th:href="@{/roles}">
            <i class="bi bi-shield-lock me-1"></i>
            Roles
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2">
        <div sec:authorize="isAnonymous()" class="d-flex align-items-center gap-2">
          <a th:href="@{/}" class="btn btn-outline-light btn-sm rounded-pill">
            Presentation
          </a>
          <a th:href="@{/login}" class="btn btn-light btn-sm rounded-pill">
            Connexion
          </a>
        </div>

        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
          <a th:href="@{/profile}"
             class="btn btn-light btn-sm rounded-pill d-flex align-items-center gap-2"
             title="Profil">
            <span class="avatar-box avatar-box-light"
                  th:text="${userInitials != null ? userInitials : 'U'}">U</span>
            <span class="d-none d-md-inline fw-semibold"
                  th:text="${userDisplayName != null ? userDisplayName : 'Profil'}">Profil</span>
          </a>

          <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-outline-light btn-sm rounded-pill">
              <i class="bi bi-box-arrow-right me-1"></i>
              Deconnexion
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</nav>
</body>
</html>
