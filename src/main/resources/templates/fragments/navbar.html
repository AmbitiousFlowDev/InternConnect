<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="main(activePage)" class="navbar navbar-expand-xl navbar-dark bg-primary sticky-top py-2 app-navbar">
  <div class="container-xl">
    <a class="navbar-brand fw-bold fs-3" th:href="@{/home}">
      InternConnect
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Basculer la navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-lg-4 me-auto mb-2 mb-lg-0">
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" th:classappend="${activePage == 'presentation'} ? ' active'" th:href="@{/}">
            <i class="bi bi-compass"></i>
            Presentation
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:classappend="${activePage == 'home'} ? ' active'" th:href="@{/home}">
            <i class="bi bi-house-door"></i>
            Accueil
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active'" th:href="@{/dashboard}">
            <i class="bi bi-speedometer2"></i>
            Tableau de bord
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'internships'} ? ' active'" th:href="@{/internships}">
            <i class="bi bi-briefcase"></i>
            Stages
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:classappend="${activePage == 'applications'} ? ' active'" th:href="@{/applications/status}">
            <i class="bi bi-file-earmark-text"></i>
            Candidatures
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link app-navbar-icon-link" th:classappend="${activePage == 'messages'} ? ' active'" th:href="@{/messages}" title="Messages">
            <i class="bi bi-chat-dots"></i>
            <span>Messages</span>
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link position-relative app-navbar-icon-link" th:classappend="${activePage == 'notifications'} ? ' active'" th:href="@{/notifications}" title="Notifications">
            <i class="bi bi-bell"></i>
            <span>Notifications</span>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  data-notification-badge
                  th:classappend="${unreadNotificationsCount == null || unreadNotificationsCount == 0} ? ' d-none' : ''"
                  th:text="${unreadNotificationsCount != null ? unreadNotificationsCount : 0}">
              0
            </span>
          </a>
        </li>

        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <a class="nav-link dropdown-toggle"
             th:classappend="${activePage == 'publish' || activePage == 'my-offers' || activePage == 'recommendations' || activePage == 'bookmarks'} ? ' active'"
             href="#"
             role="button"
             data-bs-toggle="dropdown"
             aria-expanded="false">
            <i class="bi bi-grid-3x3-gap"></i>
            Plus
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" th:classappend="${activePage == 'recommendations'} ? ' active'" th:href="@{/offers/recommendations}">
                <i class="bi bi-stars me-2"></i>Recommandations
              </a>
            </li>
            <li>
              <a class="dropdown-item" th:classappend="${activePage == 'bookmarks'} ? ' active'" th:href="@{/bookmarks}">
                <i class="bi bi-bookmark me-2"></i>Sauvegardes
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li sec:authorize="hasAnyRole('POSTER','ADMIN')">
              <a class="dropdown-item" th:classappend="${activePage == 'publish'} ? ' active'" th:href="@{/offers/publish}">
                <i class="bi bi-plus-circle me-2"></i>Ajouter offre
              </a>
            </li>
            <li sec:authorize="hasAnyRole('POSTER','ADMIN')">
              <a class="dropdown-item" th:classappend="${activePage == 'my-offers'} ? ' active'" th:href="@{/offers/my}">
                <i class="bi bi-list-task me-2"></i>Mes offres
              </a>
            </li>
          </ul>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:classappend="${activePage == 'roles'} ? ' active'" th:href="@{/roles}">
            <i class="bi bi-shield-lock"></i>
            Roles
          </a>
        </li>
      </ul>

      <div class="app-navbar-actions d-flex align-items-center gap-2">
        <div sec:authorize="isAnonymous()" class="d-flex align-items-center gap-2">
          <a th:href="@{/register}" class="btn btn-outline-light btn-sm rounded-pill">
            Inscription
          </a>
          <a th:href="@{/login}" class="btn btn-light btn-sm rounded-pill">
            Connexion
          </a>
        </div>

        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
          <a th:href="@{/profile}"
             class="app-profile-link"
             th:classappend="${activePage == 'profile'} ? ' active'"
             title="Profil"
             aria-label="Profil">
            <span class="app-navbar-avatar"
                  th:text="${userInitials != null ? userInitials : (user != null && user.firstName != null ? #strings.substring(user.firstName,0,1).toUpperCase() : 'U')}">U</span>
          </a>

          <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-outline-light btn-sm rounded-pill">
              <i class="bi bi-box-arrow-right"></i>
              Deconnexion
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</nav>
</body>
</html>
